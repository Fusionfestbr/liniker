<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventim - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Eventim">
    <link rel="icon" type="image/png" href="./assets/logo-Cl5qMz5h.png">
    <link rel="apple-touch-icon" href="./assets/logo-Cl5qMz5h.png">
  <link rel="stylesheet" crossorigin href="./assets/home-CNx_hoIR.css">
<link rel="manifest" href="./manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="./registerSW.js"></script></head>
<body>

    <header class="main-header">
        <div class="logo">
            <span class="logo-text">eventim</span>
            <svg class="logo-star" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z" fill="#FFD700"/>
            </svg>
        </div>
        <div class="header-icons">
            <svg class="icon-cart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
        </div>
    </header>

    <main class="content">
        <!-- Banner 1: Beleza -->
        <section class="banner-section">
            <div class="banner beauty-banner">
                <div class="banner-text">
                    <h1>A TAXA DE SERVIÇO AGORA É</h1>
                    <div class="taxa-label">
                        <span class="bracket">[</span>
                        <span class="label-inner">TAXA DE<br><strong>BELEZA</strong></span>
                        <span class="bracket">]</span>
                    </div>
                    <div class="barcode-small">||||||||||||||||||||||||||||</div>
                    <a href="#" class="btn-saiba-mais">SAIBA MAIS</a>
                    <div class="banner-footer">
                        <span class="eventim-mini">eventim<span class="star-mini">✦</span></span>
                        <span class="divider">|</span>
                        <span class="partner">C6FEST</span>
                    </div>
                </div>
                <div class="banner-image">
                    <img src="./assets/banner_beauty-ELJN3AQs.png" alt="Beleza Banner">
                </div>
            </div>
        </section>

        <!-- Banner 2: Eventim Pass -->
        <section class="banner-section">
            <div class="banner pass-banner">
                <div class="pass-bg-text">PASS EVENTIM PASS EVENTIM PASS EVENTIM</div>
                <div class="pass-card">
                    <div class="card-cutout left"></div>
                    <div class="card-content">
                        <div class="pass-logo">
                            <span class="pass-text">eventim.pass</span>
                            <span class="pass-star">✦</span>
                        </div>
                        <p>seus ingressos no seu smartphone</p>
                    </div>
                    <div class="card-cutout right"></div>
                </div>
                <div class="pass-bg-text bottom">PASS EVENTIM PASS EVENTIM PASS EVENTIM</div>
            </div>
        </section>

        <!-- Section: Destaques -->
        <section class="destaques-section">
            <h2>Destaques</h2>
            <div class="horizontal-scroll">
                <div class="event-card">
                    <img src="./assets/ed_sheeran-D_EDjaMk.png" alt="Ed Sheeran">
                </div>
                <div class="event-card">
                    <img src="./assets/hayley_williams-z51PT9eP.png" alt="Hayley Williams">
                </div>
                <div class="event-card">
                    <div class="poster-placeholder yellow"></div>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>

        <a href="#" class="nav-item">

            <span>Buscar</span>
        </a>
        <a href="#" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            <span>No Radar</span>
        </a>
        <a href="meus-eventos.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"></path><path d="M13 5v2"></path><path d="M13 17v2"></path><path d="M13 11v2"></path></svg>
            <span>Meus Even...</span>
        </a>
        <a href="#" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Perfil</span>
        </a>
