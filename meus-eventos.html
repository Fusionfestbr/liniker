<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventim - Meus Eventos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="icon" type="image/png" href="./assets/logo.png">

<body>

    <header class="meus-eventos-header">
        <div class="header-tabs">
            <div class="tab active">Em breve</div>
            <div class="tab">Passado</div>
        </div>
        <div class="header-title-section">
            <h1>Meus Eventos</h1>
            <p>Para ver a lista de ingressos que você possui, selecione o evento desejado</p>
        </div>

    <main class="events-list">

        <div class="month-header">
            <span class="month">Julho</span>
            <span class="year">2026</span>
        </div>

        <!-- Event Card:  -->
        <a href="index.html" class="event-card-premium">
            <div class="card-image-area">
                <img src="./assets/liniker.png" alt="Liniker">
            </div>

                <h2 class="event-title">LINIKER | BYE BYE CAJU</h2>
                <div class="event-datetime">Sábado 11/07/26, 19:00</div>
            </div>
            <div class="card-footer-area">
                <div class="venue-logo">
                    <img src="./assets/allianz.png" alt="Elo">
                </div>
                <div class="venue-info">
                    <div class="venue-name">Nubank Parque</div>
                    <div class="venue-city">São Paulo</div>
                </div>
            </div>
        </a>

        <!-- Month Header -->
        <div class="month-header">
            <span class="month">novembro</span>
            <span class="year">2025</span>
        </div>
